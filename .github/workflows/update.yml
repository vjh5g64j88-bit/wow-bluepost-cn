name: Update Blue Posts

on:
  schedule:
    # 每 2 小时触发（UTC 时间，偶数整点）
    - cron: '0 */2 * * *'
  workflow_dispatch: {}  # 允许手动触发

# 确保同一时间只有一个实例在运行
concurrency:
  group: bluepost-update
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Test DeepSeek API connectivity
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: |
          python -c "
          import requests, os
          key = os.environ.get('DEEPSEEK_API_KEY', '')
          print(f'API Key loaded: {bool(key)} (length={len(key)})')
          try:
              r = requests.get('https://api.deepseek.com/v1/models', headers={'Authorization': f'Bearer {key}'}, timeout=15.0)
              print(f'Status: {r.status_code}')
              print(f'Response: {r.text[:300]}')
          except Exception as e:
              print(f'Connection failed: {type(e).__name__}: {e}')
          "

      - name: Run update script
        env:
          DEEPSEEK_API_KEY: ${{ secrets.DEEPSEEK_API_KEY }}
        run: python scripts/main.py

      - name: Deploy to Cloudflare Pages
        if: success()
        uses: cloudflare/pages-action@v1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          projectName: wow-bluepost-cn
          directory: output
          gitHubToken: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Upload site artifact (fallback)
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: site
          path: output/
